name: Flutter Mobile App CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Flutter Analyze, Test & Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Print Flutter Info
      run: flutter --version

    - name: Get Dependencies
      run: flutter pub get

    - name: Verify Android Platform Files
      run: test -f android/app/build.gradle.kts && test -f android/app/src/main/AndroidManifest.xml

    - name: Run Flutter Static Analysis
      run: flutter analyze

    - name: Run Flutter Unit Tests
      run: flutter test

    - name: Build Android Release APK
      run: flutter build apk --release

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: bank-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
